name: Community Catalog

on:
  pull_request:
    paths:
      - "community/submissions/**"
      - "community/SUBMIT.md"
      - "community/README.md"
      - "tests/validate-community-submissions.py"
      - "tests/validate-community-submissions.sh"
  push:
    branches:
      - main
      - master
    paths:
      - "community/submissions/**"
      - "community/SUBMIT.md"
      - "community/README.md"
      - "tests/validate-community-submissions.py"
      - "tests/validate-community-submissions.sh"

jobs:
  validate-community-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run hygiene check
        run: bash tests/release-hygiene.sh

      - name: Validate catalog submissions
        run: bash tests/validate-community-submissions.sh
